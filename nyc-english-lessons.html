     ],
     rule:'Heard it twice from a friend? Now you can use it.',
     ruleJp:'これで3回目のルール。もう覚えましたね。'},
    {n:'Dialogue', type:'dialogues', h:'Two dialogues', s:'The last day. Everything comes together here.', jp:'最終日。全部がここでつながります。',
     dlgs:[
       {t:'① Telling the story of your day', turns:[
         {s:'a',w:'Maya',en:'Hey! How was your day?',jp:'やあ！今日どうだった？'},
         {s:'b',w:'Rina',en:'Oh my god, so good. Okay so — we went to the natural history museum.',jp:'めっちゃよかった！えっとね、自然史博物館行ったの。'},
         {s:'a',w:'Maya',en:'Ooh, nice. Was it crowded?',jp:'いいね。混んでた？'},
         {s:'b',w:'Rina',en:'So crowded. We waited like 40 minutes.',jp:'めっちゃ混んでた。40分くらい待った。'},
         {s:'a',w:'Maya',en:'Ugh, that sucks.',jp:'うわ、つらい。'},
         {s:'b',w:'Rina',en:'Yeah, but the dinosaurs were huge. It was worth it. Have you been?',jp:'うん、でも恐竜が巨大だった。行ってよかった。行ったことある？'},
         {s:'a',w:'Maya',en:'Yeah, when I was a kid! Did you see the whale?',jp:'子どものときにね。クジラ見た？'},
         {s:'b',w:'Rina',en:'The whale! It was so big. I took like 50 pictures.',jp:'クジラ！めっちゃ大きかった。50枚くらい写真撮った。'}
       ]},
       {t:'② Explaining Toyooka, then saying goodbye', turns:[
         {s:'a',w:'Maya',en:"So what's your town like? Is it like Tokyo?",jp:'あなたの町ってどんな感じ？東京みたいなの？'},
         {s:'b',w:'Rina',en:"Haha, no. The opposite. It's really small — mostly rice fields.",jp:'あはは、逆。すごく小さくて、ほとんど田んぼ。'},
         {s:'a',w:'Maya',en:'Oh, that sounds so peaceful.',jp:'なんか平和そう。'},
         {s:'b',w:'Rina',en:"It is. But there's a hot spring town next to us. People walk around outside in robes.",jp:'そうなの。でも隣に温泉町があって、みんな浴衣で外を歩いてる。'},
         {s:'a',w:'Maya',en:'Wait, really? Outside? In a robe?',jp:'え、まじで？外を？浴衣で？'},
         {s:'b',w:'Rina',en:"Yeah! It's like... a pajama party, but it's a whole town.",jp:'うん！パジャマパーティーみたいな、でも町全体。'},
         {s:'a',w:'Maya',en:"Okay, that's amazing. I'm coming to Japan.",jp:'それ最高。日本行くわ。'},
         {s:'b',w:'Rina',en:"You should! Oh — and my city makes most of the bags in Japan. This one's from there.",jp:'来て！あ、あと私の町、日本の鞄の多くを作ってるの。これもそう。'},
         {s:'a',w:'Maya',en:'No way. That is so cool. Hey — do you have Instagram?',jp:'うそ。かっこいい。ねえ、インスタやってる？'},
         {s:'b',w:'Rina',en:"Yeah! What's your @? I'll send you the pictures.",jp:'うん！アカウント名は？写真送るね。'},
         {s:'a',w:'Maya',en:'Perfect. It was so nice meeting you!',jp:'完璧。会えてよかった！'},
         {s:'b',w:'Rina',en:'You too! Have a good one.',jp:'こちらこそ！じゃあね。'}
       ]}
     ]},
    {n:'Review', type:'cloze', h:'Final check — all three lessons', s:'Mixed review. Some of these are from Lesson 1 and 2.', jp:'総復習。レッスン1・2からも出ます。',
     qs:[
       {sit:'Explain 城崎温泉 to a friend at camp.', txt:"It's ____ a pajama party, but it's a whole town.", o:['like','same','as'], a:0,
        ws:['','"It\'s same a pajama party" is not grammatical. You would need "It\'s the same as..." — a different pattern.','"It\'s as a pajama party" does not work. The fixed pattern is "It\'s like ___, but ___."'],
        wsJp:['','"It\'s same a..." は文法的に成立しません。"It\'s the same as..." なら使えますが、別の型です。','"It\'s as a..." は使えません。決まった型は "It\'s like ___, but ___."'],
        why:'"It\'s like ___, but ___." The most useful pattern in the whole course. Use it for everything.',
        whyJp:'"It\'s like ___, but ___." このコースで一番使える型。何にでも使えます。'},
       {sit:'You want to start telling a story.', txt:'____ so — today we went to Brooklyn.', o:['Okay','Well then','By the way'], a:0,
        ws:['','"Well then" sounds old-fashioned and slightly dramatic — like a villain in a movie.','"By the way" introduces a SIDE topic. You are starting the main story.'],
        wsJp:['','"Well then" は古風で、少し芝居がかって聞こえます。映画の悪役みたいです。','"By the way" は「ところで」＝話をそらすときの表現。今から本題を始めるので合いません。'],
        why:'"Okay so —" is how every teenager starts a story. It also buys you thinking time.',
        whyJp:'"Okay so —" は10代が話を始めるときの定番。考える時間も稼げます。'},
       {sit:'You want their contact.', txt:'Do you have ____?', o:['Instagram','the Instagram',"Instagram's"], a:0,
        ws:['','No "the" with app names. "The Instagram" sounds like something your grandfather would say.','The apostrophe makes it possessive — something belonging to Instagram. Not what you mean.'],
        wsJp:['','アプリ名に the はつけません。"the Instagram" はおじいちゃんの言い方に聞こえます。','アポストロフィは所有格。「インスタの〜」という意味になってしまいます。'],
        why:'No "the". And "What\'s your @?" is pronounced "what\'s your AT?"',
        whyJp:'the はつけない。"What\'s your @?" は「ワッツ・ユア・アット？」と読みます。'},
       {sit:'Casual goodbye to someone you just met.', txt:'You say: ____', o:['Have a good one!','Goodbye, sir.','I will see you tomorrow at 9.'], a:0,
        ws:['','"Sir" is far too formal for a teenager, and "Goodbye" on its own can sound cold or final.','You just met them — you probably will NOT see them tomorrow at 9. It sounds strangely specific.'],
        wsJp:['','"Sir" は10代には堅すぎます。"Goodbye" だけだと冷たく、今生の別れのように響くことも。','今会ったばかりの相手です。明日9時に会う予定はないはず。妙に具体的で不自然です。'],
        why:'"Have a good one!" is warm, casual, and extremely natural.',
        whyJp:'"Have a good one!" は温かくてカジュアル、とても自然な別れの挨拶です。'},
       {sit:'You cannot find your group. Emergency.', txt:'I got ____ from my group.', o:['separated','lost','away'], a:0,
        ws:['','"I got lost" is correct on its own — but "I got lost FROM my group" is not English.','"Got away" means you escaped. It sounds like you ran away from your group on purpose.'],
        wsJp:['','"I got lost"（道に迷った）単体なら正しいですが、"lost from my group" とは言えません。','"got away" は「逃げた」。グループからわざと逃げ出したように聞こえます。'],
        why:'separated = はぐれた. Learn this one cold — you will not have time to think.',
        whyJp:'separated＝はぐれた。これは丸暗記。本番に考える時間はありません。'},
       {sit:'Someone says "I love your jacket!"', txt:'You say: ____', o:['Thank you!',"No, it's cheap.",'Really? No.'], a:0,
        ws:['','謙遜 does not translate. It makes the other person feel bad — like you rejected their gift.','This sounds like you are arguing with them, or that you think they are lying to you.'],
        wsJp:['','謙遜は英語では通じません。相手は「贈り物を断られた」ように感じて悲しくなります。','相手と言い争っているか、「うそでしょ」と疑っているように聞こえます。'],
        why:'Take the compliment. Just say thank you. That is the whole move.',
        whyJp:'ほめ言葉は素直に受け取る。"Thank you!" だけ。それで完璧です。'},
       {sit:'REVIEW — Lesson 1. You did not hear them.', txt:"Sorry, I didn't ____ that.", o:['catch','listen','hear to'], a:0,
        ws:['','Same as Lesson 1 — "listen" is a choice you make. "Catch" is the word for failing to hear.','Not English. The word is "catch."'],
        wsJp:['','レッスン1と同じ。listen は「自分から聞く」こと。「聞き取れなかった」は catch。','英語として存在しません。正解は catch です。'],
        why:'Still the most important phrase you own.',
        whyJp:'今でもあなたの持つ一番大事なフレーズです。'},
       {sit:'REVIEW — Lesson 2. Invite a friend to eat.', txt:'____ go get food?', o:['Wanna','Do you want to you','You want'], a:0,
        ws:['','Repeated "you." Just say "Wanna."','Missing "to" and missing the question form. "Wanna" fixes everything.'],
        wsJp:['','you が重複しています。"Wanna" と言えばOK。','to が抜けていて、疑問文の形でもありません。"Wanna" が全部解決します。'],
        why:'wanna. Every time.',
        whyJp:'wanna。毎回これ。'}
     ]},
    {n:'Culture', type:'culture', h:'The last things to know', s:'Listen only. Some of these will save your feelings.', jp:'聞くだけ。傷つかないための話も含みます。',
     items:[
       {t:'Camp friendships are fast and hot — and then everyone flies home.', d:'People will act like your best friend in ten minutes. Some will message you forever; some will never message again. That is not rejection, it is just how camp works. Do not take it personally.', jp:'10分で親友のようになります。ずっと連絡をくれる子も、二度と来ない子もいます。拒絶ではなく、キャンプとはそういうもの。'},
       {t:'"Let\'s hang out sometime!" often means nothing.', d:'It is social politeness — like 「また今度ね」. If YOU want it to be real, name a time: "Are you free Friday?" That is completely normal and welcome here.', jp:'「また今度ね」と同じ。本気にしたいなら、あなたから日時を言えばいい。それは失礼ではありません。'},
       {t:'Personal questions come fast.', d:'Do you have a boyfriend? How much was that? How much do your parents make? You are allowed to say "Haha, I\'m not telling!" That is a normal, friendly answer.', jp:'かなり踏み込んだ質問が飛んできます。「秘密！」と笑って答えていいんです。'},
       {t:'Say thank you, not sorry.', d:'Late? "Thanks for waiting!" — not "I\'m so sorry." Confused? "Thanks for explaining." Over-apologizing makes people uncomfortable, because they assume you did something wrong.', jp:'遅刻→「待っててくれてありがとう」。謝りすぎると「何か悪いことした？」と思われます。'},
       {t:'A hug may happen at goodbye.', d:'Especially on the last day. You do not have to hug. A wave and "It was so nice meeting you!" is perfectly fine — nobody will be offended.', jp:'最終日はハグされるかも。しなくて大丈夫。手を振って「会えてよかった！」で十分です。'}
     ]},
    {n:'Free Talk', type:'free', h:'Free talk — the real thing', s:'Longer turns now. You are ready for this.', jp:'今度は長めに話します。もう大丈夫。',
     cards:[
       {t:'Tell me the story of your best day in New York — two minutes. I will react and ask three questions.', jp:'NYで一番よかった日の話を2分で。私が反応して質問3つします。'},
       {t:'Explain three Toyooka things to me — hot springs, storks, bags. Use "It\'s like ___, but ___." every time.', jp:'豊岡のこと3つ説明して（温泉・コウノトリ・鞄）。毎回 "It\'s like ___, but ___." を使って。'},
       {t:'I have never heard of Toyooka. Make me want to go there. Ninety seconds.', jp:'私は豊岡を知りません。行きたくさせてください。90秒で。'},
       {t:'Roleplay: it is the last day. Get my Instagram and say goodbye.', jp:'ロールプレイ：最終日。私のインスタを聞いて、別れの挨拶をして。'},
       {t:'I will ask you rude, personal questions. Refuse them — politely, with a laugh.', jp:'失礼な質問をします。笑ってやんわり断ってください。'},
       {t:'You are lost near Times Square. Your phone is dead. Ask me for help.', jp:'タイムズスクエアで迷子。スマホの電池切れ。助けを求めて。'},
       {t:'Compliment me three times. I will try to refuse — you have to make me accept them.', jp:'私を3回ほめて。私は謙遜します。受け取らせてください。'},
       {t:'Tell me what you will miss most about New York — and what you missed about Toyooka while you were here.', jp:'NYで恋しくなるものと、NY滞在中に恋しかった豊岡のものを話して。'}
     ],
     helper:'Okay so — · It\'s like ___, but ___ · Have you been? · It was worth it · Do you have Instagram? · It was so nice meeting you · Have a good one!'},
    {n:'Mission', type:'metro', h:'The real mission', lab:'Mission 03',
     doThis:'Get one person\'s Instagram. In English.', jp:'誰か1人のインスタを聞く。英語で。それだけ。',
     foot:'Use this way · Two seconds of courage', footJp:'勇気は2秒だけ。それだけのスキルです。'}
  ]
}
];

let L = 0, S = 0;
const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');

/* ---------- builders ---------- */
function bMission(d){
  return `<div class="kicker">Today</div><h2>${esc(d.h)}</h2>
  <p class="sub">${esc(d.s)}<span class="jp">${esc(d.jp)}</span></p>
  ${d.pts.map(p=>`<div class="card"><h4 style="font-size:19px;margin-bottom:6px;line-height:1.3">${esc(p.t)}</h4>
    <p style="font-family:var(--talk);font-size:15.5px;color:#4C4C52;line-height:1.6">${esc(p.d)}
    <span class="jp" style="display:block;color:#707076;font-size:14px;margin-top:6px;line-height:1.65">${esc(p.jp)}</span></p></div>`).join('')}`;
}
function bPhrases(d){
  return `<div class="kicker">Phrase Bank</div><h2>${esc(d.h)}</h2>
  <p class="sub">${esc(d.s)}<span class="jp">${esc(d.jp)}</span></p>
  ${d.items.map(i=>`<div class="phrase${i.warn?' warn':''}">
    <div class="ph-en">${esc(i.en)}</div>
    ${i.jp?`<div class="ph-jp jp">${esc(i.jp)}</div>`:''}
    ${i.note?`<div class="ph-note">${esc(i.note)}${i.noteJp?`<span class="jp">${esc(i.noteJp)}</span>`:''}</div>`:''}</div>`).join('')}`;
}
function bSayKnow(d){
  const c = a => a.map(x=>`<span class="chip">${esc(x.en)}<small class="jp">${esc(x.jp)}</small></span>`).join('');
  return `<div class="kicker">Slang, in two tiers</div><h2>${esc(d.h)}</h2>
  <p class="sub">${esc(d.s)}<span class="jp">${esc(d.jp)}</span></p>
  <div class="tier say"><div class="tier-head"><i style="background:var(--go)"></i><b>Say it</b><em>今日から使ってOK</em></div><div class="chips">${c(d.say)}</div></div>
  <div class="tier know"><div class="tier-head"><i style="background:var(--lineN)"></i><b>Know it</b><em>意味が分かればOK。まだ言わない</em></div><div class="chips">${c(d.know)}</div></div>
  <div class="rule">${esc(d.rule)}<span class="jp">${esc(d.ruleJp)}</span></div>`;
}
function bDialogues(d){
  return `<div class="kicker">Practice</div><h2>${esc(d.h)}</h2>
  <p class="sub">${esc(d.s)}<span class="jp">${esc(d.jp)}</span></p>
  ${d.dlgs.map((g,gi)=>`
    <h4 style="font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);margin:24px 0 10px">${esc(g.t)}</h4>
    <button class="btn-ghost" data-hide="${gi}" aria-pressed="false">Hide Rina's lines</button>
    <div class="dlg" id="dlg${gi}">
      ${g.turns.map(t=>`<div class="turn ${t.s}">
        ${t.s==='b'?'':`<span class="who">${esc(t.w)}</span>`}
        <span class="bub${d.pale&&t.s==='b'?' pale':''}">${esc(t.en)}<span class="jp">${esc(t.jp)}</span></span>
        ${t.s==='b'?`<span class="who">${esc(t.w)}</span>`:''}
      </div>`).join('')}
    </div>`).join('')}`;
}
function bCloze(d,si){
  return `<div class="kicker">Review</div><h2>${esc(d.h)}</h2>
  <p class="sub">${esc(d.s)}<span class="jp">${esc(d.jp)}</span></p>
  ${d.qs.map((q,qi)=>`<div class="q" id="q${si}_${qi}" data-ws="${encodeURIComponent(JSON.stringify(q.ws||[]))}" data-wsjp="${encodeURIComponent(JSON.stringify(q.wsJp||[]))}">
    <div class="q-sit">${esc(q.sit)}</div>
    <div class="q-txt">${esc(q.txt).replace('____','<u></u>')}</div>
    <div class="opts">${q.o.map((o,oi)=>`<button class="opt" data-q="${si}_${qi}" data-i="${oi}" data-a="${q.a}">${esc(o)}</button>`).join('')}</div>
    <div class="q-no" id="no${si}_${qi}"></div>
    <div class="q-why">${esc(q.why)}<span class="jp">${esc(q.whyJp||'')}</span></div>
  </div>`).join('')}
  <div class="score"><span>Score</span><span><b id="sc${si}">0</b> / ${d.qs.length}</span></div>`;
}
function bCulture(d){
  return `<div class="kicker">Culture — listen only</div><h2>${esc(d.h)}</h2>
  <p class="sub">${esc(d.s)}<span class="jp">${esc(d.jp)}</span></p>
  ${d.items.map((i,n)=>`<div class="cu"><div class="cu-n">0${n+1}</div><div>
    <h4>${esc(i.t)}</h4><p>${esc(i.d)}<span class="jp">${esc(i.jp)}</span></p></div></div>`).join('')}`;
}
function bFree(d,si){
  return `<div class="kicker">Free talk</div><h2>${esc(d.h)}</h2>
  <p class="sub">${esc(d.s)}<span class="jp">${esc(d.jp)}</span></p>
  <div class="draw" id="draw${si}">
    <div class="lab">Scenario card</div>
    <div class="task" id="task${si}">Tap below to draw a card.<span class="jp">下のボタンでカードを引いてください。</span></div>
  </div>
  <button class="btn-solid" data-draw="${si}">Draw a card →</button>
  <div class="helper"><b>Keep these in front of you</b>
    <div style="font-family:var(--talk);font-size:16px;color:#3A3A40;line-height:1.75">${esc(d.helper)}</div></div>`;
}
function bMetro(d){
  return `<div class="kicker">Take it with you</div><h2>${esc(d.h)}</h2>
  <p class="sub">One thing. Not ten. Do this and the trip changes.<span class="jp">1つだけ。10個じゃない。これをやれば旅行が変わります。</span></p>
  <div class="metro">
    <div class="mc-in">
      <div class="mc-lab">${esc(d.lab)}</div>
      <div class="mc-mark">Mission<span>Card</span></div>
      <div class="mc-do">${esc(d.doThis)}</div>
      <div class="mc-jp jp">${esc(d.jp)}</div>
    </div>
    <div class="mc-hole"></div>
    <div class="mc-stripe"></div>
    <div class="mc-swipe">
      <span class="arw">◀◀ ←</span>
      <b>${esc(d.foot)}<em>${esc(d.footJp||'')}</em></b>
    </div>
  </div>`;
}

/* ---------- render ---------- */
function render(){
  const les = D[L], st = les.stops[S];
  document.documentElement.style.setProperty('--accent', les.color);
  const bl = $('bullet');
  bl.textContent = les.bullet;
  bl.className = 'bullet' + (les.dark?' dark':'');
  $('eyebrow').textContent = `Lesson ${L+1} · ${les.name}`;
  $('stopname').textContent = st.n;

  $('lines').innerHTML = D.map((l,i)=>`<button class="line-tab" role="tab" aria-selected="${i===L}" data-l="${i}">
    <span class="dot" style="background:${l.color};${l.dark?'color:#0B0B0C':''}">${l.bullet}</span>${l.name}</button>`).join('');
  $('route').innerHTML = les.stops.map((s,i)=>`<button class="stopdot ${i<S?'done':''} ${i===S?'here':''}" data-s="${i}">
    <i></i><span>${s.n}</span></button>`).join('');

  let html='';
  if(st.type==='mission') html=bMission(st);
  else if(st.type==='phrases') html=bPhrases(st);
  else if(st.type==='sayknow') html=bSayKnow(st);
  else if(st.type==='dialogues'){ st.pale = les.dark; html=bDialogues(st); }
  else if(st.type==='cloze') html=bCloze(st,L+'_'+S);
  else if(st.type==='culture') html=bCulture(st);
  else if(st.type==='free') html=bFree(st,L+'_'+S);
  else if(st.type==='metro') html=bMetro(st);
  $('stage').innerHTML = `<section class="slide on">${html}</section>`;

  $('cnt').textContent = `${S+1} / ${les.stops.length}`;
  $('prev').disabled = (L===0 && S===0);
  const nx = $('next');
  nx.disabled = (L===D.length-1 && S===les.stops.length-1);
  nx.className = 'next' + (les.dark?' dark-txt':'');
  document.querySelectorAll('.btn-solid').forEach(b=>b.className='btn-solid'+(les.dark?' dark-txt':''));
  window.scrollTo({top:0,behavior:'instant'});
}

/* ---------- events ---------- */
document.addEventListener('click', e=>{
  const t = e.target.closest('button');
  if(!t) return;

  if(t.dataset.l !== undefined){ L=+t.dataset.l; S=0; render(); return; }
  if(t.dataset.s !== undefined){ S=+t.dataset.s; render(); return; }

  if(t.id==='next'){ const l=D[L];
    if(S<l.stops.length-1) S++; else if(L<D.length-1){ L++; S=0; }
    render(); return; }
  if(t.id==='prev'){
    if(S>0) S--; else if(L>0){ L--; S=D[L].stops.length-1; }
    render(); return; }

  if(t.id==='jpBtn'){
    const on = t.getAttribute('aria-pressed')==='true';
    t.setAttribute('aria-pressed', String(!on));
    t.textContent = on ? '日本語 OFF' : '日本語 ON';
    document.body.classList.toggle('jp-off', on);
    return; }

  if(t.dataset.hide !== undefined){
    const dlg = $('dlg'+t.dataset.hide);
    const on = t.getAttribute('aria-pressed')==='true';
    t.setAttribute('aria-pressed', String(!on));
    dlg.classList.toggle('hide-b', !on);
    t.textContent = on ? "Hide Rina's lines" : "Show Rina's lines";
    return; }

  if(t.classList.contains('opt')){
    const q = $('q'+t.dataset.q);
    if(q.classList.contains('solved')) return;
    const right = t.dataset.i === t.dataset.a;
    t.classList.add(right?'right':'wrong');
    const no = $('no'+t.dataset.q);
    if(right){
      q.classList.add('solved');
      q.querySelectorAll('.opt').forEach(o=>o.disabled=true);
      if(no) no.classList.remove('on');
      const sc = $('sc'+t.dataset.q.split('_').slice(0,2).join('_'));
      if(sc) sc.textContent = String(+sc.textContent + 1);
      const u = q.querySelector('u');
      if(u){ u.textContent = t.textContent; u.style.borderBottomColor='var(--go)'; u.style.padding='0 4px'; }
    } else {
      t.disabled = true;
      let ws=[], wj=[];
      try{ ws = JSON.parse(decodeURIComponent(q.dataset.ws||'[]')); }catch(e){}
      try{ wj = JSON.parse(decodeURIComponent(q.dataset.wsjp||'[]')); }catch(e){}
      const msg = ws[+t.dataset.i], msgJp = wj[+t.dataset.i];
      if(no && msg){
        no.innerHTML = '<b>Why not "'+esc(t.textContent)+'"</b>' + esc(msg)
          + (msgJp ? '<span class="jp">'+esc(msgJp)+'</span>' : '');
        no.classList.add('on');
      }
    }
    return; }

  if(t.dataset.draw !== undefined){
    const si = t.dataset.draw;
    const st = D[L].stops[S];
    if(!st._bag || !st._bag.length) st._bag = st.cards.map((_,i)=>i).sort(()=>Math.random()-.5);
    const c = st.cards[st._bag.pop()];
    $('task'+si).innerHTML = esc(c.t)+`<span class="jp">${esc(c.jp)}</span>`;
    t.textContent = st._bag.length ? 'Draw another →' : 'Reshuffle →';
    return; }
});
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='BUTTON' && e.key===' ') return;
  if(e.key==='ArrowRight') $('next').click();
  if(e.key==='ArrowLeft') $('prev').click();
});
render();
</script>
</body>
</html>
